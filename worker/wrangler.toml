name = "bountyhunter-worker"
main = "src/index.js"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# ─── D1 Database ───────────────────────────────────────────────────────────────
# Run `npm run db:create` then paste the returned database_id below
[[d1_databases]]
binding = "DB"
database_name = "bountyhunter-db"
database_id = "3b419cea-734a-4bf7-9f55-f2d32f54c53d"
migrations_dir = "migrations"

# ─── R2 Storage (resumes, cover letters, screenshots) ──────────────────────────
# Run `npm run r2:create` first
[[r2_buckets]]
binding = "STORAGE"
bucket_name = "bountyhunter-storage"
# preview_bucket_name = "bountyhunter-storage-preview"  # optional local dev bucket

# ─── Queues (async job pipeline) ───────────────────────────────────────────────
# Run `npm run queue:create` first
[[queues.producers]]
binding = "JOB_QUEUE"
queue = "bountyhunter-job-queue"

# Consumer already registered — omit to avoid "already has a consumer" deploy error
# [[queues.consumers]]
# queue = "bountyhunter-job-queue"
# max_batch_size = 5
# max_batch_timeout = 30

# ─── Secrets (set via `wrangler secret put <NAME>`) ────────────────────────────
# JWT_SECRET         — random 32+ char string
# ANTHROPIC_API_KEY  — from console.anthropic.com
# RAPIDAPI_KEY       — from rapidapi.com (enables JSearch: Indeed/LinkedIn/Glassdoor aggregation)
# SERPAPI_KEY        — from serpapi.com (enables Google Jobs: aggregates Indeed/LinkedIn/Glassdoor)
# PLAYWRIGHT_SERVICE_URL — http://your-vps-ip:3001
# PLAYWRIGHT_SERVICE_TOKEN — shared secret for playwright microservice

# ─── Cron Triggers (job alerts) ──────────────────────────────────────────────
[triggers]
crons = ["0 8 * * *"]  # Run daily at 8:00 AM UTC

[vars]
ENVIRONMENT = "development"
CORS_ORIGIN = "http://localhost:5175"
